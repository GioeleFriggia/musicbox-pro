spring:
  application:
    name: musicbox
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/musicbox}
    username: ${DB_USERNAME:musicbox}
    password: ${DB_PASSWORD:musicbox}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  jwt-secret: ${JWT_SECRET:change_me_with_a_long_random_secret_key_at_least_32_chars}
  jwt-expiration-ms: 86400000
  jamendo-client-id: ${JAMENDO_CLIENT_ID:}
  discogs-token: ${DISCOGS_TOKEN:}
  discogs-user-agent: ${DISCOGS_USER_AGENT:MusicBoxPro/1.0 +mailto:you@example.com}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
